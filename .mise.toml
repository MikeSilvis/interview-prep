[tools]
# Node is used by the markdown viewer in `viewer/`
node = "20"

[tasks."viewer:install"]
run = "cd viewer && npm install"
description = "Install dependencies for the markdown viewer app"

[tasks."viewer:build-css"]
run = "cd viewer && npm run build:css"
description = "Build Tailwind/DaisyUI CSS for the markdown viewer"

[tasks."viewer:start"]
run = "cd viewer && npm start"
description = "Start the markdown viewer on http://localhost:3000"

[tasks."viewer:docker:build"]
run = "cd viewer && docker build -t markdown-viewer ."
description = "Build the markdown viewer Docker image"

[tasks."viewer:docker:run"]
run = "docker run --rm -p 3000:3000 -v \"$(pwd)\":/content -e CONTENT_ROOT=/content markdown-viewer"
description = "Run the markdown viewer Docker container, mounting the current repo as content"

