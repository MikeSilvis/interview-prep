<!doctype html>
<html lang="en" data-theme="nord">
  <head>
    <meta charset="utf-8" />
    <title>{{title}}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="min-h-screen text-base-content">
    <div class="app-shell">
      <div class="drawer">
        <input id="docs-drawer" type="checkbox" class="drawer-toggle" />
        <div class="drawer-content flex flex-col">
          <header
            class="sticky top-0 z-20 border-b border-base-300/40 bg-sky-900 text-sky-50"
          >
            <div class="navbar min-h-12 px-3 md:px-4 text-sky-50">
              <div class="flex-none">
                <label
                  for="docs-drawer"
                  aria-label="Open navigation"
                  class="btn btn-ghost btn-square btn-sm"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    class="h-5 w-5"
                    aria-hidden="true"
                  >
                    <path
                      fill="currentColor"
                      d="M4 7h16a1 1 0 0 0 0-2H4a1 1 0 0 0 0 2Zm0 6h16a1 1 0 0 0 0-2H4a1 1 0 0 0 0 2Zm0 6h16a1 1 0 0 0 0-2H4a1 1 0 0 0 0 2Z"
                    />
                  </svg>
                </label>
              </div>
              <div class="flex-1 items-center gap-x-2">
                <div class="flex flex-1 items-center gap-x-3">
                  <div class="flex min-w-0 flex-col">
                    <span
                      class="text-sm font-semibold truncate"
                      id="page-title"
                    >
                      {{pageTitle}}
                    </span>
                  </div>
                  <div class="hidden items-center lg:flex lg:flex-1">
                    <div class="relative w-full">
                      <input
                        id="page-search"
                        type="search"
                        placeholder="Search pages..."
                        class="input input-sm w-full bg-base-100/90 border border-base-300/60 text-sm text-base-content placeholder:text-base-content/60"
                        autocomplete="off"
                        spellcheck="false"
                      />
                      <div
                        id="page-search-results"
                        class="absolute left-0 right-0 z-30 mt-1 hidden max-h-80 overflow-y-auto rounded-lg border border-base-300/60 bg-base-100 shadow-lg"
                      ></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </header>
          <main class="flex-1 overflow-y-auto px-4 py-6 md:px-8 md:py-8">
            <article class="prose lg:prose-lg max-w-none">
              {{content}}
            </article>
          </main>
        </div>
        <div class="drawer-side">
          <label for="docs-drawer" class="drawer-overlay" aria-label="Close navigation"></label>
          <aside
            class="app-sidebar w-[36rem] bg-base-100/95 border-r border-base-300/40 backdrop-blur-xl"
          >
            {{sidebar}}
          </aside>
        </div>
      </div>
    </div>
    <script src="/viewer.js" defer></script>
  </body>
</html>
